<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="10 12 105 75">
  <defs>
    <mask id="mill-cutout">
      <rect x="-10" y="-10" width="140" height="110" fill="white"/>
      <!-- Gear teeth cutouts -->
      <rect x="15" y="16" width="4" height="2" fill="black"/>
      <rect x="15" y="20" width="4" height="2" fill="black"/>
      <rect x="15" y="24" width="4" height="2" fill="black"/>
      <rect x="15" y="28" width="4" height="2" fill="black"/>
      <rect x="15" y="32" width="4" height="2" fill="black"/>
      <rect x="15" y="36" width="4" height="2" fill="black"/>
      <rect x="15" y="40" width="4" height="2" fill="black"/>
      <rect x="15" y="44" width="4" height="2" fill="black"/>
      <rect x="15" y="48" width="4" height="2" fill="black"/>
      <rect x="15" y="52" width="4" height="2" fill="black"/>
      <rect x="15" y="56" width="4" height="2" fill="black"/>
      <rect x="15" y="60" width="4" height="2" fill="black"/>
      <rect x="15" y="64" width="4" height="2" fill="black"/>
      
      <!-- Cylinder internal details - dashed lines or dots for bolts -->
      <!-- Top row -->
      <circle cx="32" cy="27" r="1.5" fill="black"/><circle cx="42" cy="27" r="1.5" fill="black"/><circle cx="52" cy="27" r="1.5" fill="black"/><circle cx="62" cy="27" r="1.5" fill="black"/><circle cx="72" cy="27" r="1.5" fill="black"/>
      <!-- Middle row -->
      <circle cx="32" cy="40" r="1.5" fill="black"/><circle cx="42" cy="40" r="1.5" fill="black"/><circle cx="52" cy="40" r="1.5" fill="black"/><circle cx="62" cy="40" r="1.5" fill="black"/><circle cx="72" cy="40" r="1.5" fill="black"/>
      <!-- Bottom row -->
      <circle cx="32" cy="53" r="1.5" fill="black"/><circle cx="42" cy="53" r="1.5" fill="black"/><circle cx="52" cy="53" r="1.5" fill="black"/><circle cx="62" cy="53" r="1.5" fill="black"/><circle cx="72" cy="53" r="1.5" fill="black"/>
      
      <!-- Base structure cutouts -->
      <polygon points="32,75 47,75 48,60 35,60" fill="black"/>
      <polygon points="53,75 68,75 65,60 52,60" fill="black"/>
      
      <!-- Discharge opening -->
      <ellipse cx="112" cy="40" rx="3" ry="7" fill="black"/>
    </mask>
  </defs>
  <g mask="url(#mill-cutout)" fill="currentColor">
    <!-- Base Bottom Plinth -->
    <path d="M 12 75 L 102 75 L 98 84 L 16 84 Z"/>
    
    <!-- Left stand -->
    <path d="M 22 55 L 28 55 L 32 75 L 18 75 Z"/>
    
    <!-- Right stand -->
    <path d="M 70 50 L 78 50 L 82 75 L 66 75 Z"/>
    
    <!-- Gear Ring -->
    <rect x="16" y="15" width="8" height="50" rx="1"/>
    
    <!-- Main Cylinder -->
    <rect x="24" y="20" width="52" height="40"/>
    
    <!-- Right Flanges & Trunnion -->
    <path d="M 76 25 L 80 25 L 80 55 L 76 55 Z"/>
    <path d="M 80 28 L 86 28 L 86 52 L 80 52 Z"/>
    <path d="M 86 32 L 94 32 L 94 48 L 86 48 Z"/>
    
    <!-- Cone/Chute end -->
    <path d="M 94 26 L 112 30 L 112 50 L 94 54 Z"/>
  </g>
</svg>
