<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Adamus KPI Dashboard - Track and manage key performance indicators across departments">
    <title>Adamus KPI Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom Styles (after Bootstrap to override) -->
    <link rel="stylesheet" href="css/style.css?v=20260622_3">
</head>

<body>
    <!-- App Container -->
    <div id="app">
        <!-- Persistent toggle button when sidebar is collapsed -->
        <button id="sidebar-toggle" class="btn btn-light shadow-sm position-fixed px-2" style="top: 1rem; left: 1rem; z-index: 1030; display: none;" onclick="window.expandSidebarExplicit()" title="Expand Sidebar">
            <i class="bi bi-list fs-4 text-primary"></i>
        </button>

        <!-- Sidebar Navigation (hidden by default, shown when logged in) -->
        <nav id="sidebar" class="sidebar collapsed">
            <!-- Sidebar content rendered by JS -->
        </nav>

        <!-- Main Content Area -->
        <main id="content" class="main-content">
            <!-- Loading indicator -->
            <div class="d-flex justify-content-center align-items-center min-vh-100">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- html2pdf.js for exporting snapshots -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Application Scripts (cache-busting query string — bump on deploy) -->
    <script src="js/api.js?v=20260624_15"></script>
    <script src="js/calculations.js?v=20260623_1"></script>
    <script src="js/dom.js?v=20260623_1"></script>
    <script src="js/app.js?v=20260624_16"></script>
</body>

</html>
